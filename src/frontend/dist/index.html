<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>নওশীন ব্রডব্যান্ড ইন্টারনেট</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="নওশীন ব্রডব্যান্ড" />
    <!-- Primary apple-touch-icon: SW serves dynamic logo at 180x180 if uploaded -->
    <link rel="apple-touch-icon" sizes="180x180" id="apple-touch-icon" href="/dynamic-apple-touch-icon.png" />
    <script>
      // Fallback: if no SW dynamic icon yet, use data URL from localStorage
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('nosheen_company_settings') || 'null');
          if (s && s.logo) {
            var el = document.getElementById('apple-touch-icon');
            if (el) el.setAttribute('href', s.logo);
          }
        } catch (_) {}
      })();
    </script>
    <script>
      // When logo is saved in Settings, update manifest href to force Chrome re-read
      window.addEventListener('nosheen_manifest_update', function(e) {
        var link = document.querySelector('link[rel="manifest"]');
        if (link) {
          link.setAttribute('href', '/manifest.json?v=' + e.detail);
        }
        // Also update apple-touch-icon href to force iOS re-read
        var ati = document.getElementById('apple-touch-icon');
        if (ati) {
          ati.setAttribute('href', '/dynamic-apple-touch-icon.png?v=' + e.detail);
        }
      });
    </script>
    <script type="module" crossorigin src="/assets/index-OP8lhGkq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Da4Sk7k1.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
